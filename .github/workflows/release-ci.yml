name: CI

on:
  push:
    tags:
      - v*

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Check ACR credentials
        id: check_acr
        run: |
          if [ -n "${{ secrets.ALIYUN_ACR_USER }}" ] && [ -n "${{ secrets.ALIYUN_ACR_PASSWORD }}" ]; then
            echo "has_creds=true" >> $GITHUB_OUTPUT
          else
            echo "has_creds=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to Aliyun Container Registry
        if: steps.check_acr.outputs.has_creds == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_ACR_REGISTRY || 'registry.cn-hangzhou.aliyuncs.com' }}
          username: ${{ secrets.ALIYUN_ACR_USER }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Set env variables
        id: set_env
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          ACR_REGISTRY="${{ secrets.ALIYUN_ACR_REGISTRY || 'registry.cn-hangzhou.aliyuncs.com' }}"
          ACR_NAMESPACE="${{ secrets.ALIYUN_ACR_NAMESPACE || 'devops-dh' }}"
          HAS_CREDS="${{ steps.check_acr.outputs.has_creds }}"
          
          echo "TAG_NAME=${TAG_NAME}" >> $GITHUB_ENV
          echo "ACR_REGISTRY=${ACR_REGISTRY}" >> $GITHUB_ENV
          echo "ACR_NAMESPACE=${ACR_NAMESPACE}" >> $GITHUB_ENV
          
          if [ "${HAS_CREDS}" == "true" ]; then
            IMAGE_LATEST="${ACR_REGISTRY}/${ACR_NAMESPACE}/watchalert:latest"
            IMAGE_VERSION="${ACR_REGISTRY}/${ACR_NAMESPACE}/watchalert:${TAG_NAME}"
            echo "IMAGE_TAG_LATEST=${IMAGE_LATEST}" >> $GITHUB_ENV
            echo "IMAGE_TAG_VERSION=${IMAGE_VERSION}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG_LATEST=watchalert:latest" >> $GITHUB_ENV
            echo "IMAGE_TAG_VERSION=watchalert:${TAG_NAME}" >> $GITHUB_ENV
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.check_acr.outputs.has_creds == 'true' }}
          # 禁用所有元数据以避免权限问题
          provenance: false
          sbom: false
          # 尝试增加超时时间
          outputs: type=image,push=${{ steps.check_acr.outputs.has_creds == 'true' }}
          build-args: |
            VERSION=${{ env.TAG_NAME }}
          tags: |
            ${{ env.IMAGE_TAG_LATEST }}
            ${{ env.IMAGE_TAG_VERSION }}